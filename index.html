<style>
  :root{
    --inter:#2563A8; --intra:#E0701E;
    --ink:#14181f; --muted:#6b7480; --line:#e3e6ea;
    --panel:rgba(255,255,255,0.95);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%}
  body{font-family:'IBM Plex Sans',sans-serif;color:var(--ink);overflow:hidden;background:#eef0f2}
  #map{position:absolute;inset:0}

  .topbar{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;align-items:baseline;gap:14px;
    padding:14px 20px;background:linear-gradient(180deg,rgba(255,255,255,0.92),rgba(255,255,255,0));pointer-events:none}
  .topbar h1{font-size:18px;font-weight:700;letter-spacing:-0.01em}
  .topbar .sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);
    text-transform:uppercase;letter-spacing:0.08em}

  .panel{position:absolute;top:16px;right:16px;z-index:6;width:300px;max-height:calc(100% - 32px);
    display:flex;flex-direction:column;background:var(--panel);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 28px rgba(20,24,31,0.13);overflow:hidden}
  .ph{padding:12px 14px 10px;border-bottom:1px solid var(--line)}
  .ph .titlerow{display:flex;justify-content:space-between;align-items:baseline}
  .ph .ttl{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;
    text-transform:uppercase;letter-spacing:0.1em;color:var(--muted)}
  .ph .num{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted)}
  .search{margin-top:9px;width:100%;border:1px solid var(--line);border-radius:8px;
    padding:8px 10px;font-family:'IBM Plex Sans';font-size:13px;outline:none;transition:.15s}
  .search:focus{border-color:var(--muted)}

  .modebar{display:none;margin-top:9px;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .modebar.show{display:flex}
  .modebar button{flex:1;border:none;background:#fff;font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;letter-spacing:.04em;padding:6px 0;cursor:pointer;color:var(--muted);transition:.14s}
  .modebar button.on{background:var(--ink);color:#fff}

  .chips{display:flex;flex-wrap:wrap;gap:5px;padding:9px 12px 0}
  .chip{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:500;
    background:#f1f3f6;border:1px solid var(--line);border-radius:20px;padding:3px 8px 3px 7px}
  .chip .dot{width:8px;height:8px;border-radius:50%}
  .chip .x{cursor:pointer;color:var(--muted);font-weight:700;line-height:1}
  .chip .x:hover{color:var(--ink)}
  .clear{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);
    cursor:pointer;padding:6px 12px 0;display:none}
  .clear.show{display:block}
  .clear:hover{color:var(--ink)}

  .list{flex:1;overflow-y:auto;padding:6px;min-height:80px}
  .row{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:8px;cursor:pointer;
    transition:background .12s;user-select:none}
  .row:hover{background:#f4f6f8}
  .row .check{width:17px;height:17px;border-radius:5px;border:1.5px solid #cfd4da;flex:none;
    display:grid;place-items:center;background:#fff;transition:.12s}
  .row.sel .check{background:var(--rowc,#14181f);border-color:var(--rowc,#14181f)}
  .row .check svg{width:10px;height:10px;stroke:#fff;stroke-width:3;fill:none;opacity:0}
  .row.sel .check svg{opacity:1}
  .row .meta{flex:1;min-width:0}
  .row .name{font-size:12.5px;font-weight:500;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .cnt{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-top:1px}
  .tag{font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:600;letter-spacing:.05em;
    padding:2px 5px;border-radius:4px;flex:none}
  .tag.I{color:var(--inter);background:rgba(37,99,168,.1)}
  .tag.X{color:var(--intra);background:rgba(224,112,30,.12)}
  .tag.B{color:#555;background:#ececec}

  .pf{padding:9px 13px;border-top:1px solid var(--line);font-family:'IBM Plex Mono',monospace;
    font-size:9.5px;color:var(--muted);display:flex;gap:14px;align-items:center}
  .pf .lg{display:flex;align-items:center;gap:5px}
  .pf .sw{width:14px;height:3px;border-radius:2px}

  .maplibregl-popup{max-width:260px!important}
  .maplibregl-popup-content{font-family:'IBM Plex Sans';border-radius:10px;padding:0;
    box-shadow:0 6px 22px rgba(20,24,31,0.18);overflow:hidden;border:1px solid var(--line)}
  .pop-head{padding:10px 13px 8px;display:flex;align-items:center;gap:8px}
  .pop-dot{width:9px;height:9px;border-radius:50%;flex:none}
  .pop-op{font-size:13.5px;font-weight:700;line-height:1.2}
  .pop-body{padding:0 13px 12px;display:grid;grid-template-columns:auto 1fr;gap:3px 14px}
  .pop-k{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.06em;align-self:center}
  .pop-v{font-size:12.5px;font-weight:500;text-align:right}
  .maplibregl-popup-close-button{font-size:17px;color:var(--muted);padding:2px 7px}

  .banner{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);z-index:30;display:none;
    background:#2a2f3a;color:#fff;font-size:12.5px;padding:11px 16px;border-radius:9px;max-width:520px;
    box-shadow:0 8px 24px rgba(0,0,0,.25);line-height:1.45}
  .banner code{font-family:'IBM Plex Mono';background:rgba(255,255,255,.14);padding:1px 5px;border-radius:4px}
</style>
</head>

  map.addLayer({id:'base-case',type:'line',source:'pipes','source-layer':'pipelines',
    paint:{'line-color':'#ffffff','line-opacity':0.5,
      'line-width':['interpolate',['linear'],['zoom'],4,1.8,8,4.5,12,7]},
    layout:{'line-cap':'round','line-join':'round'}});
  map.addLayer({id:'base',type:'line',source:'pipes','source-layer':'pipelines',
    paint:{'line-color':TYPE_COLOR,'line-opacity':0.85,
      'line-width':['interpolate',['linear'],['zoom'],4,0.8,8,1.8,12,3]},
    layout:{'line-cap':'round','line-join':'round'}});

  // selection overlay (filtered + data-driven color)
  map.addLayer({id:'sel-case',type:'line',source:'pipes','source-layer':'pipelines',
    filter:['in',['get','op'],['literal',[]]],
    paint:{'line-color':'#ffffff','line-opacity':0.85,
      'line-width':['interpolate',['linear'],['zoom'],4,3.2,8,6.5,12,10]},
    layout:{'line-cap':'round','line-join':'round'}});
  map.addLayer({id:'sel',type:'line',source:'pipes','source-layer':'pipelines',
    filter:['in',['get','op'],['literal',[]]],
    paint:{'line-color':TYPE_COLOR,
      'line-width':['interpolate',['linear'],['zoom'],4,1.6,8,3,12,4.8],'line-opacity':0.95},
    layout:{'line-cap':'round','line-join':'round'}});

  setupInteractions();
  applySelection();
});

map.on('error',e=>{
  const msg=(e&&e.error&&e.error.message)||'';
  if(/pipelines\.pmtiles|Failed to fetch|404|NetworkError/i.test(msg)){
    const b=document.getElementById('banner');
    b.style.display='block';
    b.innerHTML='Map data (<code>pipelines.pmtiles</code>) isn\'t loading. This happens when the file is opened directly &mdash; serve the folder with <code>npx serve</code> or deploy to GitHub Pages, keeping <code>pipelines.pmtiles</code> next to this page.';
  }
});

function setupInteractions(){
  const popup=new maplibregl.Popup({closeButton:true,closeOnClick:true});
  const layers=['sel','base'];
  map.on('mouseenter',layers,()=>map.getCanvas().style.cursor='pointer');
  map.on('mouseleave',layers,()=>map.getCanvas().style.cursor='');
  map.on('click',e=>{
    const hit=map.queryRenderedFeatures(e.point,{layers});
    if(!hit.length) return;
    const p=hit[0].properties;
    const c=selected.get(p.op) || (p.type==='Interstate'?'#2563A8':'#E0701E');
    popup.setLngLat(e.lngLat).setHTML(
      '<div class="pop-head"><span class="pop-dot" style="background:'+c+'"></span><span class="pop-op">'+p.op+'</span></div>'+
      '<div class="pop-body"><span class="pop-k">Type</span><span class="pop-v">'+p.type+'</span>'+
      '<span class="pop-k">Length</span><span class="pop-v">'+p.mi+' mi</span>'+
      '<span class="pop-k">Status</span><span class="pop-v">Operating</span></div>'
    ).addTo(map);
  });
}

function colorMatch(){
  if(selected.size===0) return TYPE_COLOR;
  const expr=['match',['get','op']];
  selected.forEach((c,op)=>{expr.push(op,c)});
  expr.push('#999');
  return expr;
}
function applySelection(){
  const ops=[...selected.keys()];
  const filt=['in',['get','op'],['literal',ops]];
  if(map.getLayer('sel')){
    map.setFilter('sel',filt); map.setFilter('sel-case',filt);
    map.setPaintProperty('sel','line-color',colorMatch());
  }
  const has=ops.length>0;
  if(map.getLayer('base')){
    if(!has){ map.setLayoutProperty('base','visibility','visible');
      map.setLayoutProperty('base-case','visibility','visible');
      map.setPaintProperty('base','line-opacity',0.85); map.setPaintProperty('base-case','line-opacity',0.5);}
    else if(mode==='isolate'){ map.setLayoutProperty('base','visibility','none');
      map.setLayoutProperty('base-case','visibility','none');}
    else { map.setLayoutProperty('base','visibility','visible');
      map.setLayoutProperty('base-case','visibility','visible');
      map.setPaintProperty('base','line-opacity',0.13); map.setPaintProperty('base-case','line-opacity',0.0);}
  }
  document.getElementById('modebar').classList.toggle('show',has);
  document.getElementById('clear').classList.toggle('show',has);
  renderChips();
}

// ---- panel ----
const listEl=document.getElementById('list');
const searchEl=document.getElementById('search');
document.getElementById('opNum').textContent=CATALOG.length+' total';
let nextColor=0;

function tagFor(types){
  if(types.length>1) return ['B','I/X'];
  return types[0]==='Interstate'?['I','INTER']:['X','INTRA'];
}
function renderList(){
  const q=searchEl.value.trim().toLowerCase();
  listEl.innerHTML='';
  const rows=CATALOG.filter(o=>!q||o.op.toLowerCase().includes(q));
  if(!rows.length){listEl.innerHTML='<div style="padding:14px;color:#9aa1aa;font-size:12px">No operators match.</div>';return;}
  rows.forEach(o=>{
    const [tc,tl]=tagFor(o.types);
    const isSel=selected.has(o.op);
    const row=document.createElement('div');
    row.className='row'+(isSel?' sel':'');
    if(isSel) row.style.setProperty('--rowc',selected.get(o.op));
    row.innerHTML='<span class="check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>'+
      '<span class="meta"><span class="name">'+o.op+'</span><span class="cnt">'+o.n.toLocaleString()+' segments</span></span>'+
      '<span class="tag '+tc+'">'+tl+'</span>';
    row.onclick=()=>toggleOp(o.op);
    listEl.appendChild(row);
  });
}
function toggleOp(op){
  if(selected.has(op)) selected.delete(op);
  else { selected.set(op, PALETTE[nextColor++ % PALETTE.length]); }
  applySelection(); renderList();
}
function renderChips(){
  const c=document.getElementById('chips');
  c.innerHTML='';
  selected.forEach((col,op)=>{
    const el=document.createElement('span'); el.className='chip';
    el.innerHTML='<span class="dot" style="background:'+col+'"></span>'+op+'<span class="x">&times;</span>';
    el.querySelector('.x').onclick=()=>toggleOp(op);
    c.appendChild(el);
  });
}
searchEl.oninput=renderList;
document.getElementById('clear').onclick=()=>{selected.clear();nextColor=0;applySelection();renderList();};
document.querySelectorAll('#modebar button').forEach(b=>{
  b.onclick=()=>{mode=b.dataset.mode;
    document.querySelectorAll('#modebar button').forEach(x=>x.classList.toggle('on',x===b));
    applySelection();};
});
renderList();
</script>
</body>
