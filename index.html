<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Natural Gas Network</title>
<link href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pmtiles@4.3.0/dist/pmtiles.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
<style>
  :root{--inter:#2563A8;--intra:#E0701E;--gas:#C0392B;--ink:#14181f;--muted:#6b7480;--line:#e3e6ea;--panel:rgba(255,255,255,0.96)}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%}
  body{font-family:'IBM Plex Sans',sans-serif;color:var(--ink);overflow:hidden;background:#eef0f2;-webkit-text-size-adjust:100%}
  #map{position:absolute;inset:0}
  .topbar{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;align-items:baseline;gap:12px;padding:14px 18px;background:linear-gradient(180deg,rgba(255,255,255,0.92),rgba(255,255,255,0));pointer-events:none}
  .topbar h1{font-size:17px;font-weight:700;letter-spacing:-0.01em}
  .topbar .sub{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em}
  .stack{position:absolute;top:14px;right:14px;z-index:6;display:flex;flex-direction:column;gap:10px;align-items:flex-end;max-height:calc(100% - 28px)}
  .unit{display:flex;flex-direction:column;align-items:flex-end;min-height:0}
  .menuwrap{display:flex;flex-direction:column;align-items:flex-end}
  .menubtn{display:flex;align-items:center;gap:9px;background:var(--panel);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:11px;padding:11px 15px;box-shadow:0 6px 20px rgba(20,24,31,0.14);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--ink)}
  .menubtn svg{width:16px;height:16px;stroke:var(--ink);stroke-width:2;fill:none}
  .menudrop{display:none;flex-direction:column;gap:6px;margin-top:8px;width:208px}
  .menudrop.show{display:flex}
  .menudrop button{display:flex;align-items:center;gap:10px;background:var(--panel);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:10px;padding:11px 13px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;font-weight:500;color:var(--ink);text-align:left;transition:.13s;box-shadow:0 6px 18px rgba(20,24,31,0.1)}
  .menudrop button:hover{background:#f4f6f8}
  .menudrop button .mi-ic{width:18px;height:18px;display:grid;place-items:center;flex:none}
  .menudrop button .mi-ic svg{width:16px;height:16px;stroke:var(--ink);stroke-width:1.9;fill:none}
  .menudrop button .mi-dot{margin-left:auto;width:7px;height:7px;border-radius:50%;background:#1B9E77;opacity:0;transition:.13s}
  .menudrop button.open .mi-dot{opacity:1}
  .panel{width:300px;display:flex;flex-direction:column;min-height:0;background:var(--panel);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 28px rgba(20,24,31,0.13);overflow:hidden;margin-top:10px}
  .panel.hidden{display:none}
  .ph{padding:11px 12px 10px;border-bottom:1px solid var(--line)}
  .titlerow{display:flex;justify-content:space-between;align-items:center}
  .ttl{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted)}
  .hdr-right{display:flex;align-items:center;gap:8px}
  .num{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted)}
  .iconbtn{width:26px;height:26px;border:1px solid var(--line);border-radius:7px;background:#fff;display:grid;place-items:center;cursor:pointer;transition:.14s;flex:none}
  .iconbtn:hover{border-color:var(--muted)}
  .iconbtn svg{width:13px;height:13px;stroke:var(--muted);stroke-width:2.4;fill:none}
  .iconbtn:hover svg{stroke:var(--ink)}
  .search{margin-top:9px;width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-family:'IBM Plex Sans';font-size:14px;outline:none;transition:.15s}
  .search:focus{border-color:var(--muted)}
  .viewtabs{display:flex;margin-top:9px;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .viewtabs button{flex:1;border:none;background:#fff;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.03em;padding:7px 0;cursor:pointer;color:var(--muted);transition:.14s}
  .viewtabs button.on{background:var(--ink);color:#fff}
  .modebar{display:none;margin-top:9px;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .modebar.show{display:flex}
  .modebar button{flex:1;border:none;background:#fff;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.04em;padding:6px 0;cursor:pointer;color:var(--muted);transition:.14s}
  .modebar button.on{background:var(--ink);color:#fff}
  .subbar{display:none;justify-content:space-between;align-items:center;padding:8px 13px 0}
  .subbar.show{display:flex}
  .subbar .lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}
  .clear{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);cursor:pointer}
  .clear:hover{color:var(--ink)}
  .list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px;min-height:80px;max-height:42vh}
  .row{display:flex;align-items:center;gap:10px;padding:10px 9px;border-radius:8px;cursor:pointer;transition:background .12s;user-select:none}
  .row:hover{background:#f4f6f8}
  .row .check{width:18px;height:18px;border-radius:5px;border:1.5px solid #cfd4da;flex:none;display:grid;place-items:center;background:#fff;transition:.12s}
  .row.sel .check{background:var(--rowc,#14181f);border-color:var(--rowc,#14181f)}
  .row .check svg{width:11px;height:11px;stroke:#fff;stroke-width:3;fill:none;opacity:0}
  .row.sel .check svg{opacity:1}
  .row .meta{flex:1;min-width:0}
  .row .name{font-size:13px;font-weight:500;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .cnt{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-top:1px}
  .tag{font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:600;letter-spacing:.05em;padding:2px 5px;border-radius:4px;flex:none;white-space:nowrap}
  .tag.I{color:var(--inter);background:rgba(37,99,168,.1)}
  .tag.X{color:var(--intra);background:rgba(224,112,30,.12)}
  .tag.B{color:#555;background:#ececec}
  .empty{padding:18px 14px;color:#9aa1aa;font-size:12.5px;text-align:center;line-height:1.5}
  .pf{padding:9px 13px;border-top:1px solid var(--line);font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--muted);display:flex;gap:14px;align-items:center}
  .pf .lg{display:flex;align-items:center;gap:5px}
  .pf .sw{width:14px;height:3px;border-radius:2px}
  .pf .dotsw{width:9px;height:9px;border-radius:50%;background:var(--gas);border:1.5px solid #fff;box-shadow:0 0 0 1px var(--gas)}
  .switchrow{display:flex;align-items:center;justify-content:space-between;padding:10px 12px}
  .switchrow .lab{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500}
  .switchrow .lab .sw{width:14px;height:3px;border-radius:2px}
  .switchrow .lab .dot{width:9px;height:9px;border-radius:50%;background:var(--gas);border:1.5px solid #fff;box-shadow:0 0 0 1px var(--gas)}
  .toggle{width:38px;height:22px;border-radius:12px;background:#cdd2d8;position:relative;cursor:pointer;transition:.16s;flex:none;border:none}
  .toggle.on{background:var(--ink)}
  .toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.16s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .toggle.on::after{left:18px}
  .bigbtn{margin:4px 12px 12px;padding:9px 0;width:calc(100% - 24px);border:1px solid var(--line);border-radius:8px;background:#fff;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--ink);cursor:pointer;transition:.14s}
  .bigbtn:hover{background:#f4f6f8}
  .toolgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 10px 4px}
  .toolbtn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 2px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;transition:.13s;font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.03em;color:var(--muted)}
  .toolbtn svg{width:17px;height:17px;stroke:var(--ink);stroke-width:1.8;fill:none}
  .toolbtn:hover{background:#f4f6f8}
  .toolbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .toolbtn.on svg{stroke:#fff}
  .seclabel{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:10px 12px 0}
  .colorrow{display:flex;align-items:center;gap:8px;padding:6px 12px 2px;flex-wrap:wrap}
  .swatch-btn{width:21px;height:21px;border-radius:6px;border:2px solid #fff;box-shadow:0 0 0 1.5px var(--line);cursor:pointer;padding:0}
  .swatch-btn.on{box-shadow:0 0 0 2px var(--ink)}
  input.colorpick{width:30px;height:26px;padding:0;border:1px solid var(--line);border-radius:6px;background:#fff;cursor:pointer}
  .textstyle{display:flex;align-items:center;gap:6px;padding:6px 12px 2px;flex-wrap:wrap}
  .textstyle select{flex:1;min-width:96px;border:1px solid var(--line);border-radius:6px;padding:6px 6px;font-family:'IBM Plex Sans';font-size:12.5px;background:#fff;outline:none;cursor:pointer}
  .textstyle input.sz{width:54px;border:1px solid var(--line);border-radius:6px;padding:6px 6px;font-family:'IBM Plex Sans';font-size:12.5px;background:#fff;outline:none}
  .stbtn{width:30px;height:30px;border:1px solid var(--line);border-radius:6px;background:#fff;cursor:pointer;font-size:14px;color:var(--ink);transition:.13s}
  .stbtn.b{font-weight:700}.stbtn.i{font-style:italic;font-family:Georgia,serif}
  .stbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .actionrow{display:flex;gap:6px;padding:10px 12px 4px}
  .actionrow button{flex:1;border:1px solid var(--line);border-radius:8px;background:#fff;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;padding:7px 0;cursor:pointer;color:var(--ink);transition:.13s}
  .actionrow button:hover{background:#f4f6f8}
  .actionrow button.danger:hover{background:#fdecea;color:#c0392b;border-color:#e7b9b2}
  .drawhint{padding:6px 13px 12px;font-size:10.5px;color:var(--muted);line-height:1.4}
  .pdfbtn{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:8;display:flex;align-items:center;gap:8px;background:var(--ink);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.04em;cursor:pointer;box-shadow:0 6px 22px rgba(20,24,31,0.28)}
  .pdfbtn:hover{background:#000}
  .pdfbtn svg{width:15px;height:15px;stroke:#fff;stroke-width:2;fill:none}
  .finishbar{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);z-index:8;display:none;gap:8px}
  .finishbar.show{display:flex}
  .finishbar button{border:none;border-radius:9px;padding:9px 15px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2)}
  .finishbar .done{background:#1B9E77;color:#fff}
  .finishbar .cxl{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .maplibregl-popup{max-width:270px!important}
  .maplibregl-popup-content{font-family:'IBM Plex Sans';border-radius:10px;padding:0;box-shadow:0 6px 22px rgba(20,24,31,0.18);overflow:hidden;border:1px solid var(--line)}
  .pop-head{padding:10px 13px 8px;display:flex;align-items:center;gap:8px}
  .pop-dot{width:9px;height:9px;border-radius:50%;flex:none}
  .pop-op{font-size:13.5px;font-weight:700;line-height:1.2}
  .pop-body{padding:0 13px 12px;display:grid;grid-template-columns:auto 1fr;gap:3px 14px}
  .pop-k{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;align-self:center}
  .pop-v{font-size:12.5px;font-weight:500;text-align:right}
  .maplibregl-popup-close-button{font-size:18px;color:var(--muted);padding:3px 9px}
  .text-anno{font-family:'IBM Plex Sans',sans-serif;font-weight:700;font-size:16px;white-space:nowrap;cursor:move;color:#D7263D;line-height:1.1;padding:1px 2px;text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 3px #fff,0 0 3px #fff;outline:none}
  .text-anno.sel{outline:1.5px dashed #111;outline-offset:2px;border-radius:3px}
  .text-anno[contenteditable=true]{cursor:text;min-width:14px}
  .rot-handle,.del-handle{position:absolute;transform:translate(-50%,-50%);display:none;place-items:center;border-radius:50%;box-shadow:0 2px 7px rgba(0,0,0,.28);z-index:7}
  .rot-handle.show,.del-handle.show{display:grid}
  .rot-handle{width:28px;height:28px;background:#fff;border:1.5px solid var(--ink);cursor:grab;touch-action:none}
  .rot-handle:active{cursor:grabbing}
  .rot-handle svg{width:15px;height:15px;stroke:var(--ink);stroke-width:2;fill:none}
  .del-handle{width:25px;height:25px;background:#D7263D;border:1.5px solid #fff;cursor:pointer}
  .del-handle svg{width:13px;height:13px;stroke:#fff;stroke-width:2.3;fill:none}
  .size-handle{position:absolute;transform:translate(-50%,-50%);display:none;place-items:center;width:22px;height:22px;background:#fff;border:1.5px solid var(--ink);border-radius:5px;box-shadow:0 2px 7px rgba(0,0,0,.28);cursor:nwse-resize;z-index:7;touch-action:none}
  .size-handle.show{display:grid}
  .size-handle svg{width:12px;height:12px;stroke:var(--ink);stroke-width:2;fill:none}
  .vert-handle{position:absolute;transform:translate(-50%,-50%);width:14px;height:14px;background:#fff;border:2px solid var(--ink);border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.3);cursor:move;z-index:7;touch-action:none}
  .rangerow{display:flex;align-items:center;gap:8px;padding:6px 12px 2px}
  .rangerow input[type=range]{flex:1}
  .rangerow span{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted);width:34px;text-align:right}
  .stbtn2{flex:1;border:1px solid var(--line);border-radius:6px;background:#fff;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;padding:7px 0;color:var(--ink);transition:.13s}
  .stbtn2.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .banner{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);z-index:30;display:none;background:#2a2f3a;color:#fff;font-size:12.5px;padding:11px 16px;border-radius:9px;max-width:520px;box-shadow:0 8px 24px rgba(0,0,0,.25);line-height:1.45;width:calc(100% - 32px)}
  .banner code{font-family:'IBM Plex Mono';background:rgba(255,255,255,.14);padding:1px 5px;border-radius:4px}
  @media (max-width:560px){.stack{left:12px;right:12px;top:12px;align-items:stretch}.menuwrap{align-items:stretch}.menudrop{width:auto}.panel{width:auto}.menubtn{justify-content:center}.topbar{padding:12px 14px}.topbar h1{font-size:16px}.list{max-height:34vh}.pdfbtn{bottom:14px}}
</style>
</head>
<body>
<div id="map"></div>
<div class="topbar"><h1>Natural Gas Network</h1><span class="sub">US &middot; Pipelines &amp; Gas Plants</span></div>

<button class="pdfbtn" id="pdfBtn"><svg viewBox="0 0 24 24"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"/></svg>Save PDF</button>
<div class="finishbar" id="finishBar"><button class="done" id="polyDone">Finish polygon</button><button class="cxl" id="polyCancel">Cancel</button></div>
<div class="banner" id="banner"></div>

function createPanel(cfg){

   '<div class="viewtabs" id="'+P+'Tabs"><button data-view="all" class="on">All</button><button data-view="selected">Selected (0)</button></div>'+
   '<div class="modebar" id="'+P+'Mode"><button data-mode="highlight" class="on">Highlight</button><button data-mode="isolate">Isolate</button></div></div>'+

    if(map.getLayer(cfg.selColorLayer)) map.setPaintProperty(cfg.selColorLayer,cfg.selColorProp,colorMatch(sel,cfg.baseColor));
    cfg.baseVis.forEach(l=>{ if(map.getLayer(l)){ const v=!on?'none':((has&&mode==='isolate')?'none':'visible'); map.setLayoutProperty(l,'visibility',v); }});
    cfg.baseOpac.forEach(o=>{ if(map.getLayer(o.id)) map.setPaintProperty(o.id,o.prop,!has?o.on:(mode==='isolate'?o.on:o.dim)); });

  function close(){ $('Panel').classList.add('hidden'); if(window.refreshMenu)window.refreshMenu(); }

    if(drawTool==='text'){ e.preventDefault(); placeText(e); return; }
    if(drawTool==='none'){ const f=hitShape(e); if(f){ selectShape(f.properties.id); moveId=f.properties.id; lastLL=ll(e); map.dragPan.disable(); e.preventDefault(); } else { clearSel(); if(window.__drawPanel)window.__drawPanel.close(); } return; }
    if(drawTool==='polygon'){ const p=ll(e); polyPts.push([p.lng,p.lat]); document.getElementById('finishBar').classList.add('show'); updatePoly(); e.preventDefault(); return; }
    drawing=true; startLL=ll(e); if(drawTool==='freehand'){ freePts=[[startLL.lng,startLL.lat]]; } e.preventDefault();
  });
  window.addEventListener('pointermove',e=>{
    if(draggingVert>=0){ const f=feats.find(x=>x.properties.id===selId); if(f&&f.geometry.type==='Polygon'){ const p=ll(e); const ring=f.geometry.coordinates[0]; ring[draggingVert]=[p.lng,p.lat]; if(draggingVert===0) ring[ring.length-1]=[p.lng,p.lat]; redraw(); positionVertHandles(); updateHandles(); } return; }
    if(rotating){ onRotateMove(e); return; }
    if(resizing){ onResizeMove(e); return; }
    if(moveId!=null){ const p=ll(e); translate(moveId,p.lng-lastLL.lng,p.lat-lastLL.lat); lastLL=p; redraw(); updateHandles(); return; }
    if(!drawing) return; const p=ll(e), cur=[p.lng,p.lat];
    if(drawTool==='rect') draft=poly(rectRing(startLL,p),0,'rect');
    else if(drawTool==='circle') draft=poly(circleRing(startLL,p),0,'circle');
    else if(drawTool==='line') draft=arrowF(startLL,p);
    else if(drawTool==='freehand'){ freePts.push(cur); draft=lineF(freePts,0,'free'); }
    redraw();
  });
  window.addEventListener('pointerup',()=>{
    if(draggingVert>=0){ draggingVert=-1; return; }
    if(rotating){ rotating=false; return; }
    if(resizing){ resizing=false; return; }
    if(moveId!=null){ moveId=null; lastLL=null; map.dragPan.enable(); updateHandles(); return; }
    if(!drawing) return; drawing=false;
    if(draft){ const g=draft.geometry; const ok=(g.type==='LineString')?g.coordinates.length>=2:true; if(ok){ commit(draft); draft=null; redraw(); if(window.__draw)window.__draw.setTool('none'); return; } }
    draft=null; redraw();
  });
  window.addEventListener('keydown',e=>{ if((e.key==='Delete'||e.key==='Backspace')&&selId!=null&&!/INPUT|TEXTAREA/.test(document.activeElement.tagName)&&!document.activeElement.isContentEditable){e.preventDefault();removeSelected();} });
}
function makeTextRec(lngLat){
  const el=document.createElement('div'); el.className='text-anno';
  const rec={id:idc++,el,marker:null,rotation:0,color:curColor(),style:{family:txtStyle.family,size:txtStyle.size,bold:txtStyle.bold,italic:txtStyle.italic,bg:txtStyle.bg,border:txtStyle.border},lngLat:{lng:lngLat.lng,lat:lngLat.lat}};
  styleTextEl(rec);
  const m=new maplibregl.Marker({element:el,draggable:false,anchor:'center',rotationAlignment:'viewport'}).setLngLat([lngLat.lng,lngLat.lat]).addTo(map);
  rec.marker=m;
  m.on('dragstart',()=>selectText(rec.id));
  m.on('drag',()=>updateHandles());
  m.on('dragend',()=>{const g=m.getLngLat(); rec.lngLat={lng:g.lng,lat:g.lat}; updateHandles();});
  el.addEventListener('pointerdown',ev=>ev.stopPropagation());
  el.addEventListener('click',ev=>{ ev.stopPropagation(); if(rec.el.getAttribute('contenteditable')!=='true') selectText(rec.id); });
  el.addEventListener('dblclick',ev=>{ ev.stopPropagation(); startEditText(rec); });
  el.addEventListener('keydown',ev=>{ if(ev.key==='Enter'){ev.preventDefault();el.blur();} else if(ev.key==='Escape'){el.blur();} });
  el.addEventListener('blur',()=>finishEditText(rec));
  texts.push(rec); order.push({kind:'text',id:rec.id});
  return rec;
}
function startEditText(rec){ rec.el.setAttribute('contenteditable','true'); rec.marker.setDraggable(false); rec.el.focus();
  const r=document.createRange(); r.selectNodeContents(rec.el); const s=window.getSelection(); s.removeAllRanges(); s.addRange(r); }
function finishEditText(rec){ rec.el.setAttribute('contenteditable','false'); rec.marker.setDraggable(true);
  if(!rec.el.textContent.trim()){ rec.marker.remove(); texts=texts.filter(x=>x.id!==rec.id); order=order.filter(o=>!(o.kind==='text'&&o.id===rec.id)); if(selId===rec.id) clearSel(); }
  else { updateHandles(); } }
function placeText(e){ const rec=makeTextRec(ll(e)); if(window.__draw)window.__draw.setTool('none');
  setTimeout(()=>{ rec.el.setAttribute('contenteditable','true'); if(rec.marker&&rec.marker.setDraggable)rec.marker.setDraggable(false); rec.el.focus();
    try{const r=document.createRange();r.selectNodeContents(rec.el);const s=window.getSelection();s.removeAllRanges();s.addRange(r);}catch(_){} },30); }
const drawCtl=buildDraw(); window.__drawPanel=drawCtl;
window.__panels=[pipeCtl,plantCtl,lyrCtl,drawCtl];
function openOnly(ctl){ if(window.__panels){ window.__panels.forEach(p=>{ if(p!==ctl&&p.isOpen&&p.isOpen()) p.close(); }); } if(ctl&&ctl.open) ctl.open(); }
function buildMenu(items){
  const wrap=document.createElement('div'); wrap.className='menuwrap'; wrap.id='menuWrap';
  let btns=''; items.forEach(it=>{btns+='<button data-k="'+it.key+'"><span class="mi-ic">'+it.icon+'</span><span>'+it.label+'</span><span class="mi-dot"></span></button>';});
  wrap.innerHTML='<button class="menubtn" id="menuBtn">'+HAM_ICON+'<span>Menu</span></button><div class="menudrop" id="menuDrop">'+btns+'</div>';
  stack.insertBefore(wrap, stack.firstChild);
  const drop=document.getElementById('menuDrop');
  document.getElementById('menuBtn').onclick=ev=>{ev.stopPropagation();drop.classList.toggle('show');};
  drop.querySelectorAll('button').forEach(b=>{ const it=items.find(x=>x.key===b.dataset.k); b.onclick=()=>{ if(it.ctl.isOpen())it.ctl.close(); else openOnly(it.ctl); drop.classList.remove('show'); window.refreshMenu(); }; });
  window.refreshMenu=function(){ drop.querySelectorAll('button').forEach(b=>{ const it=items.find(x=>x.key===b.dataset.k); b.classList.toggle('open', it.ctl.isOpen()); }); };
  document.addEventListener('click',ev=>{ if(!wrap.contains(ev.target)) drop.classList.remove('show'); });
  window.refreshMenu();
}
buildMenu([
  {key:'pipe',label:'Gas Pipelines',icon:PIPE_ICON,ctl:pipeCtl},
  {key:'plant',label:'Gas Plants',icon:PLANT_ICON,ctl:plantCtl},
  {key:'lyr',label:'Layers',icon:LYR_ICON,ctl:lyrCtl},
  {key:'draw',label:'Draw',icon:DRAW_ICON,ctl:drawCtl}
]);
document.getElementById('pdfBtn').onclick=()=>{
  const keepKind=selKind,keepId=selId; clearSel();
  requestAnimationFrame(()=>{ try{
    const gl=map.getCanvas(); const W=gl.width, H=gl.height; const ratio=W/map.getContainer().clientWidth;
    const c2=document.createElement('canvas'); c2.width=W; c2.height=H; const ctx=c2.getContext('2d');
    ctx.drawImage(gl,0,0);
    texts.forEach(t=>{ const p=map.project(t.lngLat); const x=p.x*ratio, y=p.y*ratio; const fs=(t.style.size||16)*ratio;
      ctx.save(); ctx.translate(x,y); if(t.rotation) ctx.rotate(t.rotation*Math.PI/180);
      ctx.font=(t.style.italic?'italic ':'')+(t.style.bold?'700 ':'400 ')+fs+'px '+t.style.family;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      const txt=t.el.textContent||''; const tw=ctx.measureText(txt).width; const pad=7*ratio; const bw=tw+pad*2, bh=fs*1.3+pad*2;
      if(t.style.bg){ ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fillRect(-bw/2,-bh/2,bw,bh); }
      if(t.style.border){ ctx.lineWidth=1.6*ratio; ctx.strokeStyle=t.color; ctx.strokeRect(-bw/2,-bh/2,bw,bh); }
      if(!t.style.bg){ ctx.lineWidth=3*ratio; ctx.strokeStyle='rgba(255,255,255,0.95)'; ctx.strokeText(txt,0,0); }
      ctx.fillStyle=t.color; ctx.fillText(txt,0,0); ctx.restore(); });
    const data=c2.toDataURL('image/png');
    const J=window.jspdf.jsPDF; const pdf=new J({orientation:W>=H?'landscape':'portrait',unit:'pt',format:[W,H]});
    pdf.addImage(data,'PNG',0,0,W,H); pdf.save('gas-network-map.pdf');
  }catch(err){ alert('Could not export the map image. Wait until the basemap finishes loading, then try again.'); }
    if(keepKind==='shape')selectShape(keepId); else if(keepKind==='text')selectText(keepId); });
};
